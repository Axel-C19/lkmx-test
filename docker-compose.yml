services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lkmx-app
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/lkmx_test
      NODE_ENV: production
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: lkmx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lkmx_test
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data: